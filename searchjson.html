<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      if (localStorage.getItem('isAuth') !== 'true') {
        window.location.href = 'login.html';
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trademark Data Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header header-flex">
      <div>
        <h1>Trademark Data Search</h1>
        <p class="version">Version 6.1</p>
      </div>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="width: auto;">Logout</button>
    </header>

    <div class="main-container">
      <aside class="left-container card">
        <h2 class="section-title">Search & Filter</h2>
        
        <form id="searchForm">
          <div class="input-group">
            <label for="searchInput" id="searchInputLabel">Search All Fields</label>
            <input
              type="text"
              id="searchInput"
              name="searchText"
              placeholder="Search App No, Trademark, Applicant, or Representative"
            />
          </div>

          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="searchField" id="searchAppNumber" value="appNumber" onclick="handleSearchFieldChange(event)" />
              Application Number
            </label>
            <label class="radio-item">
              <input type="radio" name="searchField" id="searchTmName" value="tmName" onclick="handleSearchFieldChange(event)" />
              Trademark Name
            </label>
            <label class="radio-item">
              <input type="radio" name="searchField" id="searchApplicantName" value="applicantName" onclick="handleSearchFieldChange(event)" />
              Applicant Name
            </label>
            <label class="radio-item">
              <input type="radio" name="searchField" id="searchRepName" value="repName" onclick="handleSearchFieldChange(event)" />
              Representative Name
            </label>
            <label class="radio-item">
              <input type="radio" name="searchField" id="searchAllFields" value="allFields" onclick="handleSearchFieldChange(event)" checked />
              Search All Fields
            </label>
          </div>

          <button type="submit" id="searchButton" class="btn btn-primary">Search</button>
        </form>

        <hr class="divider">

        <div class="filter-section">
          <label class="section-label">Filter by Nice Class:</label>
          <div id="classesContainer" class="checkbox-grid">
            </div>
        </div>

        <button id="copyButton" class="btn btn-outline">Copy Table Data</button>
      </aside>
     
      <main class="right-container card">
          <div class="pagination" id="pagination">
            <button id="prevButton" class="btn btn-sm" data-page="1" disabled>&larr; Previous</button>
            <div class="pagination-info">
              <span id="currentPage" class="page-badge">Page 1 of 1</span>
              <span id="totalRecords" class="total-badge">Total records: 0</span>
            </div>
            <button id="nextButton" class="btn btn-sm" data-page="1" disabled>Next &rarr;</button>
          </div>

          <div class="table-responsive">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>Logo</th>
                  <th>Application Number</th>
                  <th>Trademark Name</th>
                  <th>Status</th>
                  <th>Applicant Name</th>
                  <th>Representative Name</th>
                  <th>Class</th>
                </tr>
              </thead>
              <tbody>
                </tbody>
            </table>
          </div>
      </main>
    </div>
    
    <script src="copy.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
